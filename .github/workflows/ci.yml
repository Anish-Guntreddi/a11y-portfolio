name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Unit tests
        run: pnpm -r test
      - name: A11y / e2e tests
        run: pnpm --filter @a11y-portfolio/novaui test:e2e
      - name: Build
        run: pnpm -r build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit shipping dependencies (blocking)
        run: pnpm audit --prod --audit-level low
      - name: Audit all dependencies (report only)
        run: pnpm audit || true
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/react
            p/owasp-top-ten
            p/secrets
        continue-on-error: false
