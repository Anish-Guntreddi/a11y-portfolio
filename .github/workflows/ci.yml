name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @a11y-portfolio/novaui exec playwright install --with-deps chromium
      # Build the libraries first: the site (and cross-package types) resolve
      # @a11y-portfolio/* from their built dist, so typecheck needs them present.
      - name: Build
        run: pnpm -r build
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Unit tests
        run: pnpm -r test
      - name: A11y / e2e tests
        run: pnpm --filter @a11y-portfolio/novaui test:e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Static analysis runs on source BEFORE any dependency lifecycle scripts execute.
      - name: Semgrep scan (SAST)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --error --config p/typescript --config p/react \
            --config p/owasp-top-ten --config p/secrets \
            --exclude node_modules --exclude dist --exclude storybook-static
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      # Audit resolves the lockfile without running package lifecycle scripts.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Audit shipping dependencies (blocking)
        run: pnpm audit --prod --audit-level low
      - name: Audit all dependencies (report only)
        run: pnpm audit || true
